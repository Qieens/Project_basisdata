<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MovieTix</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

<div class="container">
    <div class="row min-vh-100 align-items-center justify-content-center">

        <div class="col-lg-6 text-center">
            <img src="{{ url_for('static', filename='images/cinema.png') }}" class="img-fluid cinema-image" alt="Cinema">
            <h1 class="mt-4 logo-title">🎬 Movie<span>Tix</span></h1>
            <p class="text-light fs-5">Booking Tiket Bioskop dengan Mudah, Cepat, dan Aman.</p>
        </div>

        <div class="col-lg-4 offset-lg-1">
            <div class="card-glass text-center" style="padding:40px 30px;">
                <div class="rounded-circle mx-auto d-flex align-items-center justify-content-center mb-3"
                     style="width:80px;height:80px;background:var(--gold);color:#000;font-size:36px;">
                    <i class="bi bi-person-fill"></i>
                </div>
                <h4 class="mb-2">Selamat Datang</h4>
                <p class="text-light mb-4" style="font-size:14px;">Masuk atau daftar untuk mulai booking tiket bioskop.</p>
                <a href="{{ url_for('auth.login', role='user') }}" class="btn btn-gold w-100 mb-2">Login</a>
                <a href="{{ url_for('auth.register', role='user') }}" class="btn btn-outline-light w-100">Register</a>
            </div>
        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
