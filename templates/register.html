<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Register | MovieTix</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

<div class="container">

    <div class="row min-vh-100 align-items-center">

        <!-- Kiri -->
        <div class="col-lg-6 text-center">

            <img src="{{ url_for('static', filename='images/cinema.png') }}"
                 class="img-fluid cinema-image">

            <h1 class="mt-4 logo-title">
                🎬 Movie<span>Tix</span>
            </h1>

            <p class="text-light fs-5">

                Bergabung sekarang dan nikmati pengalaman
                booking tiket bioskop yang mudah.

            </p>

        </div>

        <!-- Kanan -->
        <div class="col-lg-5 offset-lg-1">

            <div class="card-glass">

                <h2 class="text-center mb-4">

                    Create Account

                </h2>

                <form method="POST">

                    <div class="mb-3">

                        <label>Nama Lengkap</label>

                        <input
                            type="text"
                            name="nama"
                            class="form-control"
                            placeholder="Masukkan Nama"
                            required>

                    </div>

                    <div class="mb-3">

                        <label>Email</label>

                        <input
                            type="email"
                            name="email"
                            class="form-control"
                            placeholder="Masukkan Email"
                            required>

                    </div>

                    <div class="mb-4">

                        <label>Password</label>

                        <input
                            type="password"
                            name="password"
                            class="form-control"
                            placeholder="Masukkan Password"
                            required>

                    </div>

                    <div class="d-grid">

                        <button type="submit" class="btn btn-gold">

                            Register

                        </button>

                    </div>

                </form>

                <div class="text-center mt-4">

                    Sudah punya akun?

                    <a href="{{ url_for('login') }}">

                        Login

                    </a>

                </div>

            </div>

        </div>

    </div>

</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
