<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Admin | MovieTix</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

<div class="container">
    <div class="row min-vh-100 align-items-center">

        <div class="col-lg-6 text-center">
            <img src="{{ url_for('static', filename='images/cinema.png') }}" class="img-fluid cinema-image">
            <h1 class="mt-4 logo-title">
                🎬 Movie<span>Tix</span>
            </h1>
            <p class="text-light fs-5">
                Halaman registrasi khusus administrator.
            </p>
        </div>

        <div class="col-lg-5 offset-lg-1">
            <div class="card-glass">
                <h2 class="text-center mb-4">
                    <i class="bi bi-shield-lock"></i> Register Admin
                </h2>

                <div id="alertBox" class="alert alert-danger" style="display:none;"></div>

                <form id="registerAdminForm">
                    <div class="mb-3">
                        <label class="form-label">Nama Lengkap</label>
                        <input type="text" name="nama" class="form-control" placeholder="Masukkan Nama" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" name="email" class="form-control" placeholder="Masukkan Email" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <input type="password" name="password" class="form-control" placeholder="Masukkan Password" required>
                    </div>

                    <div class="mb-4">
                        <label class="form-label">Kode Admin</label>
                        <input type="password" name="kode_admin" class="form-control" placeholder="Masukkan Kode Admin" required>
                        <small class="text-light">Kode ini diberikan oleh pemilik sistem.</small>
                    </div>

                    <div class="d-grid">
                        <button type="submit" id="registerBtn" class="btn btn-gold">
                            Register Admin
                        </button>
                    </div>
                </form>

                <div class="text-center mt-4">
                    Sudah punya akun?
                    <a href="{{ url_for('auth.login', role='admin') }}" class="text-decoration-none fw-bold">
                        Login
                    </a>
                </div>
                <div class="text-center mt-2">
                    <a href="{{ url_for('home') }}" class="text-decoration-none" style="font-size:13px; color:var(--silver);">
                        <i class="bi bi-arrow-left me-1"></i>Kembali
                    </a>
                </div>

            </div>
        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
document.getElementById('registerAdminForm').addEventListener('submit', function(e) {
    e.preventDefault();

    const form = this;
    const submitBtn = document.getElementById('registerBtn');
    const alertBox = document.getElementById('alertBox');
    const originalBtnText = submitBtn.innerHTML;

    submitBtn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Loading...';
    submitBtn.disabled = true;
    alertBox.style.display = 'none';

    fetch("{{ url_for('auth.register_admin') }}", {
        method: 'POST',
        body: new FormData(form)
    })
    .then(response => response.json())
    .then(data => {
        if (data.status === 'error') {
            alertBox.textContent = data.message;
            alertBox.style.display = 'block';
            submitBtn.innerHTML = originalBtnText;
            submitBtn.disabled = false;
        } else if (data.status === 'success') {
            window.location.href = data.redirect_url;
        }
    })
    .catch(error => {
        alertBox.textContent = 'Terjadi kesalahan koneksi.';
        alertBox.style.display = 'block';
        submitBtn.innerHTML = originalBtnText;
        submitBtn.disabled = false;
    });
});
</script>

</body>
</html>
