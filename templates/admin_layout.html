<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Admin Panel{% endblock %} | MovieTix</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

    <style>
        .admin-wrapper { display:flex; min-height:100vh; }
        .sidebar { width:250px; background:var(--maroon-dark); padding:30px 0; flex-shrink:0; }
        .sidebar .brand { font-size:22px; font-weight:700; text-align:center; margin-bottom:40px; display:block; text-decoration:none; }
        .sidebar a { display:block; padding:12px 30px; color:var(--silver); font-weight:500; text-decoration:none; transition:0.3s; }
        .sidebar a:hover, .sidebar a.active { background:rgba(255,255,255,.08); color:var(--gold); border-left:4px solid var(--gold); }
        .main-area { flex-grow:1; padding:40px; }
        .stat-card { border-radius:16px; padding:25px; }
        .stat-card h3 { font-size:32px; font-weight:700; margin:0; }
        .table-glass { background:rgba(255,255,255,.06); border-radius:16px; overflow:hidden; }
        .table-glass table { margin-bottom:0; color:var(--white); }
        .table-glass th { background:rgba(255,255,255,.08); border:none; font-weight:600; }
        .table-glass td { border-color:rgba(255,255,255,.08); vertical-align:middle; }
        .poster-thumb { width:45px; height:65px; object-fit:cover; border-radius:6px; }
    </style>

    {% block extra_css %}{% endblock %}
</head>

<body>

<div class="admin-wrapper">
    <aside class="sidebar">
        <a href="{{ url_for('admin.admin_dashboard') }}" class="brand">🎬 Movie<span style="color:#D4AF37;">Tix</span> <br><small style="font-size:13px; color:var(--silver);">Admin Panel</small></a>
        <a href="{{ url_for('admin.admin_dashboard') }}" class="{% if active_page == 'dashboard' %}active{% endif %}"><i class="bi bi-grid me-2"></i>Dashboard</a>
        <a href="{{ url_for('admin.admin_dashboard') }}#film" class="{% if active_page == 'films' %}active{% endif %}"><i class="bi bi-film me-2"></i>Kelola Film</a>
        <a href="{{ url_for('admin.admin_dashboard') }}#jadwal" class="{% if active_page == 'schedules' %}active{% endif %}"><i class="bi bi-clock me-2"></i>Kelola Jadwal</a>
        <a href="{{ url_for('admin.admin_bookings') }}" class="{% if active_page == 'bookings' %}active{% endif %}"><i class="bi bi-ticket-perforated me-2"></i>Kelola Booking</a>
        <a href="{{ url_for('admin.admin_users') }}" class="{% if active_page == 'users' %}active{% endif %}"><i class="bi bi-people me-2"></i>Kelola User</a>
        <hr style="border-color:rgba(255,255,255,.1); margin:10px 30px;">
        <a href="{{ url_for('auth.logout') }}"><i class="bi bi-box-arrow-right me-2"></i>Logout</a>
    </aside>

    <div class="main-area">
        {% block content %}{% endblock %}
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

{% block extra_js %}{% endblock %}
</body>
</html>
