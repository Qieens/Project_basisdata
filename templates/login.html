<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | MovieTix</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>
    <div class="container">
        <div class="row min-vh-100 align-items-center">

            <div class="col-lg-6 text-center">
                <img src="{{ url_for('static', filename='images/cinema.png') }}" class="img-fluid cinema-image" alt="Cinema Illustration">
                <h1 class="mt-4 logo-title">🎬 Movie<span>Tix</span></h1>
                <p class="text-light fs-5">Booking Tiket Bioskop dengan Mudah, Cepat, dan Aman.</p>
            </div>

            <div class="col-lg-5 offset-lg-1">
                <div class="card-glass">
                    <h2 class="text-center mb-4">Welcome Back 👋</h2>

                    <form id="loginForm">
                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" name="email" id="email" class="form-control" placeholder="Masukkan Email" required>
                        </div>

                        <div class="mb-4">
                            <label class="form-label">Password</label>
                            <input type="password" name="password" id="password" class="form-control" placeholder="Masukkan Password" required>
                            
                            <div id="passwordError" class="invalid-feedback text-danger mt-1" style="display: none; font-weight: 500;"></div>
                        </div>

                        <div class="d-grid">
                            <button type="submit" id="loginBtn" class="btn btn-gold">Login</button>
                        </div>
                    </form>

                    <div class="text-center mt-4">
                        Belum punya akun? <a href="{{ url_for('auth.register', role='user') }}" class="text-decoration-none fw-bold">Register</a>
                    </div>
                    <div class="text-center mt-2">
                        <a href="{{ url_for('home') }}" class="text-decoration-none" style="font-size:13px; color:var(--silver);">
                            <i class="bi bi-arrow-left me-1"></i>Kembali
                        </a>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const form = this;
            const submitBtn = document.getElementById('loginBtn');
            const passwordInput = document.getElementById('password');
            const errorDiv = document.getElementById('passwordError');
            
            const originalBtnText = submitBtn.innerHTML;
            submitBtn.innerHTML = '<span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span> Loading...';
            submitBtn.disabled = true;

            passwordInput.classList.remove('is-invalid', 'border-danger');
            errorDiv.style.display = 'none';

            fetch("{{ url_for('auth.login') }}", {
                method: 'POST',
                body: new FormData(form)
            })
            .then(response => response.json())
            .then(data => {
                if (data.status === 'error') {
                    passwordInput.classList.add('is-invalid', 'border-danger');
                    errorDiv.textContent = data.message;
                    errorDiv.style.display = 'block';
                    submitBtn.innerHTML = originalBtnText;
                    submitBtn.disabled = false;
                } else if (data.status === 'success') {
                    window.location.href = data.redirect_url;
                }
            })
            .catch(error => {
                console.error('Error:', error);
                submitBtn.innerHTML = originalBtnText;
                submitBtn.disabled = false;
            });
        });
    </script>
</body>
</html>
