<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Booking Tiket | MovieTix</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="{{ url_for('static', filename='css/style.css') }}">

<style>

.screen{
    background:#D4AF37;
    color:black;
    font-weight:bold;
    text-align:center;
    padding:10px;
    border-radius:10px;
    margin:30px auto;
    width:80%;
    box-shadow:0 5px 15px rgba(0,0,0,.3);
}

.seat{
    width:55px;
    height:55px;
    margin:8px;
    border:none;
    border-radius:12px;
    background:#ffffff;
    color:#6D071A;
    font-weight:bold;
    transition:.3s;
}

.seat:hover{
    background:#D4AF37;
    transform:scale(1.05);
}

.seat.selected{
    background:#D4AF37;
    color:black;
}

.info-box{
    background:rgba(255,255,255,.08);
    border-radius:15px;
    padding:20px;
    margin-bottom:30px;
}

</style>

</head>

<body>

<div class="container py-5">

<div class="card-glass p-5">

<h2 class="text-center">

🎬 {{ movie.judul }}

</h2>

<hr>

<div class="info-box">

<div class="row">

<div class="col-md-4">
<b>Studio</b><br>
{{ schedule.studio }}
</div>

<div class="col-md-4">
<b>Jam</b><br>
{{ schedule.jam }}
</div>

<div class="col-md-4">
<b>Harga</b><br>
Rp {{ schedule.harga }}
</div>

</div>

</div>

<div class="screen">

LAYAR BIOSKOP

</div>

<div class="text-center">

{% for row in ['A','B','C','D','E'] %}

<div class="mb-3">

{% for i in range(1,7) %}

<button class="seat">

{{ row }}{{ i }}

</button>

{% endfor %}

</div>

{% endfor %}

</div>

<hr>

<div class="row mt-4">

<div class="col-md-6">

<h5>

Kursi Dipilih

</h5>

<p id="selectedSeat">

-

</p>

</div>

<div class="col-md-6 text-end">

<h5>

Total

</h5>

<h3>

Rp <span id="totalPrice">0</span>

</h3>

</div>

</div>

<button class="btn btn-gold w-100 mt-3">

Lanjut Pembayaran

</button>

<a href="{{ url_for('movie_detail', id=movie._id) }}"
class="btn btn-secondary mt-3">

Kembali

</a>

</div>

</div>

<script>

const seats=document.querySelectorAll(".seat");

const seatText=document.getElementById("selectedSeat");

const total=document.getElementById("totalPrice");

const harga={{ schedule.harga }};

let selected=[];

seats.forEach(seat=>{

seat.onclick=function(){

if(this.classList.contains("selected")){

this.classList.remove("selected");

selected=selected.filter(s=>s!=this.innerText);

}else{

this.classList.add("selected");

selected.push(this.innerText);

}

seatText.innerHTML=selected.join(", ") || "-";

total.innerHTML=selected.length*harga;

}

});

</script>

</body>

</html>
